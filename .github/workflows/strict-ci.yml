name: Strict CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  actions: read
  pull-requests: write

env:
  BASE_REF: ${{ github.base_ref || 'main' }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  strict:
    name: Strict checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Check changeset
        if: github.event_name == 'pull_request'
        run: npm run changeset:check

      - name: ESLint SARIF
        id: eslint_sarif
        shell: bash
        run: |
          set +e
          npx eslint . \
            --max-warnings=0 \
            --format @microsoft/eslint-formatter-sarif \
            --output-file eslint.sarif
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Setup reviewdog for ESLint
        if: always() && github.event_name == 'pull_request' && hashFiles('eslint.sarif') != ''
        uses: reviewdog/action-setup@v1
        with:
          reviewdog_version: v0.21.0
        continue-on-error: true

      - name: Reviewdog ESLint PR comments
        if: always() && github.event_name == 'pull_request' && hashFiles('eslint.sarif') != ''
        continue-on-error: true
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          reviewdog \
            -f=sarif \
            -name=eslint \
            -reporter=github-pr-review \
            -filter-mode=added \
            -level=error \
            < eslint.sarif

      - name: Fail on ESLint findings
        if: always() && steps.eslint_sarif.outputs.status != '0'
        run: exit 1

      - name: Setup Python for Semgrep
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install Semgrep
        run: python -m pip install --upgrade semgrep==1.164.0

      - name: Semgrep SARIF
        id: semgrep_sarif
        shell: bash
        run: |
          set +e
          npm run semgrep:sarif
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Setup reviewdog for Semgrep
        if: always() && github.event_name == 'pull_request' && hashFiles('semgrep.sarif') != ''
        uses: reviewdog/action-setup@v1
        with:
          reviewdog_version: v0.21.0
        continue-on-error: true

      - name: Reviewdog Semgrep PR comments
        if: always() && github.event_name == 'pull_request' && hashFiles('semgrep.sarif') != ''
        continue-on-error: true
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          reviewdog \
            -f=sarif \
            -name=semgrep \
            -reporter=github-pr-review \
            -filter-mode=added \
            -level=error \
            < semgrep.sarif

      - name: Fail on Semgrep findings
        if: always() && steps.semgrep_sarif.outputs.status != '0'
        run: exit 1

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Example build
        run: npm run example:build

      - name: Package checks
        run: npm run package:check

      - name: Pack dry run
        run: npm run pack:dry-run

      - name: Fallow SARIF
        id: fallow_sarif
        shell: bash
        run: |
          set +e
          npm run fallow:sarif
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Setup reviewdog for Fallow
        if: always() && github.event_name == 'pull_request' && hashFiles('fallow.sarif') != ''
        uses: reviewdog/action-setup@v1
        with:
          reviewdog_version: v0.21.0
        continue-on-error: true

      - name: Reviewdog Fallow PR comments
        if: always() && github.event_name == 'pull_request' && hashFiles('fallow.sarif') != ''
        continue-on-error: true
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          reviewdog \
            -f=sarif \
            -name=fallow \
            -reporter=github-pr-review \
            -filter-mode=added \
            -level=warning \
            < fallow.sarif

      - name: Fail on Fallow findings
        if: always() && steps.fallow_sarif.outputs.status != '0'
        run: exit 1

      - name: React Doctor
        if: github.event_name == 'pull_request' && hashFiles('**/*.jsx', '**/*.tsx') != ''
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$BASE_REF" == -* ]]; then
            echo "::error title=Invalid BASE_REF::BASE_REF must not start with '-'"
            exit 1
          fi
          git fetch origin "$BASE_REF"
          git branch -f "$BASE_REF" FETCH_HEAD 2>/dev/null || true
          npx react-doctor@0.2.16 . --diff "$BASE_REF" --fail-on warning --annotations
