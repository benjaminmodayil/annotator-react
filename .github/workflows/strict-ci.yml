name: Strict CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

env:
  BASE_REF: ${{ github.base_ref || 'main' }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  strict:
    name: Strict checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Check changeset
        if: github.event_name == 'pull_request'
        run: npm run changeset:check

      - name: ESLint SARIF
        id: eslint_sarif
        shell: bash
        run: |
          set +e
          npx eslint . \
            --max-warnings=0 \
            --format @microsoft/eslint-formatter-sarif \
            --output-file eslint.sarif
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Setup reviewdog for ESLint
        if: always() && github.event_name == 'pull_request' && hashFiles('eslint.sarif') != ''
        uses: reviewdog/action-setup@v1
        with:
          reviewdog_version: v0.21.0
        continue-on-error: true

      - name: Reviewdog ESLint PR comments
        if: always() && github.event_name == 'pull_request' && hashFiles('eslint.sarif') != ''
        continue-on-error: true
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          reviewdog \
            -f=sarif \
            -name=eslint \
            -reporter=github-pr-review \
            -filter-mode=added \
            -fail-level=error \
            < eslint.sarif

      - name: Setup Python for Semgrep
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install Semgrep
        run: python -m pip install --upgrade semgrep==1.164.0

      - name: Semgrep SARIF
        id: semgrep_sarif
        shell: bash
        run: |
          set +e
          npm run semgrep:sarif
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Setup reviewdog for Semgrep
        if: always() && github.event_name == 'pull_request' && hashFiles('semgrep.sarif') != ''
        uses: reviewdog/action-setup@v1
        with:
          reviewdog_version: v0.21.0
        continue-on-error: true

      - name: Reviewdog Semgrep PR comments
        if: always() && github.event_name == 'pull_request' && hashFiles('semgrep.sarif') != ''
        continue-on-error: true
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          reviewdog \
            -f=sarif \
            -name=semgrep \
            -reporter=github-pr-review \
            -filter-mode=added \
            -fail-level=error \
            < semgrep.sarif

      - name: Typecheck
        id: typecheck
        shell: bash
        run: |
          set +e
          npm run typecheck
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Test
        id: test
        shell: bash
        run: |
          set +e
          npm test
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Build
        id: build
        shell: bash
        run: |
          set +e
          npm run build
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Example build
        id: example_build
        shell: bash
        run: |
          set +e
          npm run example:build
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Package checks
        id: package_checks
        shell: bash
        run: |
          set +e
          npm run package:check
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Pack dry run
        id: pack_dry_run
        shell: bash
        run: |
          set +e
          npm run pack:dry-run
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Fallow SARIF
        id: fallow_sarif
        shell: bash
        run: |
          set +e
          npm run fallow:sarif
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Setup reviewdog for Fallow
        if: always() && github.event_name == 'pull_request' && hashFiles('fallow.sarif') != ''
        uses: reviewdog/action-setup@v1
        with:
          reviewdog_version: v0.21.0
        continue-on-error: true

      - name: Reviewdog Fallow PR comments
        if: always() && github.event_name == 'pull_request' && hashFiles('fallow.sarif') != ''
        continue-on-error: true
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          reviewdog \
            -f=sarif \
            -name=fallow \
            -reporter=github-pr-review \
            -filter-mode=added \
            -fail-level=warning \
            < fallow.sarif

      - name: React Doctor
        if: github.event_name == 'pull_request' && hashFiles('**/*.jsx', '**/*.tsx') != ''
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$BASE_REF" == -* ]]; then
            echo "::error title=Invalid BASE_REF::BASE_REF must not start with '-'"
            exit 1
          fi
          git fetch origin "$BASE_REF"
          git branch -f "$BASE_REF" FETCH_HEAD 2>/dev/null || true
          npx react-doctor@0.2.16 . --diff "$BASE_REF" --fail-on warning --annotations

      - name: Enforce captured strict gate failures
        if: always()
        shell: bash
        run: |
          set -u
          failed=0

          check_gate() {
            local name="$1"
            local status="${2-}"

            if [[ -z "$status" ]]; then
              echo "::error title=${name} missing status::${name} did not report a captured status"
              failed=1
            elif [[ "$status" != "0" ]]; then
              echo "::error title=${name} failed::${name} exited with status ${status}"
              failed=1
            fi
          }

          check_gate "ESLint SARIF" "${{ steps.eslint_sarif.outputs.status }}"
          check_gate "Semgrep SARIF" "${{ steps.semgrep_sarif.outputs.status }}"
          check_gate "Typecheck" "${{ steps.typecheck.outputs.status }}"
          check_gate "Test" "${{ steps.test.outputs.status }}"
          check_gate "Build" "${{ steps.build.outputs.status }}"
          check_gate "Example build" "${{ steps.example_build.outputs.status }}"
          check_gate "Package checks" "${{ steps.package_checks.outputs.status }}"
          check_gate "Pack dry run" "${{ steps.pack_dry_run.outputs.status }}"
          check_gate "Fallow SARIF" "${{ steps.fallow_sarif.outputs.status }}"

          exit "$failed"
