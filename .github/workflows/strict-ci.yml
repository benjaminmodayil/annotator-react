name: Strict CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  actions: read
  pull-requests: write

env:
  BASE_REF: ${{ github.base_ref || 'main' }}

jobs:
  strict:
    name: Strict checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Check changeset
        if: github.event_name == 'pull_request'
        run: pnpm run changeset:check

      - name: Install Semgrep
        run: python -m pip install semgrep

      - name: Run full checks
        run: pnpm run check:all

      - name: Fallow SARIF
        id: fallow_sarif
        shell: bash
        run: |
          set +e
          pnpm exec fallow audit \
            --changed-since "origin/${BASE_REF}" \
            --format sarif \
            --fail-on-issues \
            --quiet \
            > fallow.sarif
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Fail on Fallow findings
        if: always() && steps.fallow_sarif.outputs.status != '0'
        run: exit 1

      - name: React Doctor
        if: github.event_name == 'pull_request' && hashFiles('**/*.jsx', '**/*.tsx') != ''
        uses: millionco/react-doctor@1d3d514a562bbab42dcefa0badeed2e707ed7ea9
        with:
          diff: ${{ env.BASE_REF }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          annotations: true
          fail-on: warning
