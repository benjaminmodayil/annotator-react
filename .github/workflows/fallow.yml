name: Fallow analysis

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  checks: write
  security-events: write

jobs:
  fallow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: fallow-rs/fallow@v2
        with:
          command: audit
          gate: new-only
          dead-code-baseline: fallow-baselines/dead-code.json
          health-baseline: fallow-baselines/health.json
          dupes-baseline: fallow-baselines/dupes.json
          fail-on-issues: true
          format: sarif
          comment: true
          annotations: true
