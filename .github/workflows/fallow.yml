name: Fallow

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  checks: write
  security-events: write

jobs:
  fallow:
    name: Fallow
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fallow - Codebase Intelligence
        uses: fallow-rs/fallow@v2.75.0
        with:
          command: audit
          gate: new-only
          fail-on-issues: true
          format: sarif
          comment: true
          annotations: true
